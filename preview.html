<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Preview</title>
    <style>
      :root {
        color: #f8f8f6;
        background: #111111;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
      }

      .preview-shell {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100vh;
      }

      .preview-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 16px;
        border-bottom: 1px solid rgba(248, 248, 246, 0.14);
        background: #111111;
      }

      .preview-title {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }

      .preview-title strong {
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .preview-title span {
        color: rgba(248, 248, 246, 0.54);
        font-size: 12px;
      }

      .preview-controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      button {
        appearance: none;
        border: 1px solid rgba(248, 248, 246, 0.22);
        background: transparent;
        color: #f8f8f6;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        letter-spacing: 0.08em;
        padding: 9px 12px;
        text-transform: uppercase;
      }

      button[aria-pressed="true"] {
        background: #f4c542;
        border-color: #f4c542;
        color: #111111;
      }

      .stage {
        display: grid;
        gap: 16px;
        grid-template-columns: minmax(0, 1fr) 414px;
        min-height: 0;
        overflow: auto;
        padding: 16px;
        background: #20201f;
      }

      .panel {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 0;
        overflow: hidden;
        border: 1px solid rgba(248, 248, 246, 0.12);
        background: #0b0b0b;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        padding: 9px 11px;
        border-bottom: 1px solid rgba(248, 248, 246, 0.1);
        color: rgba(248, 248, 246, 0.58);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      iframe {
        width: 100%;
        height: 100%;
        min-height: 0;
        border: 0;
        background: #f8f8f6;
      }

      .mobile-panel {
        justify-self: center;
        width: min(100%, 414px);
      }

      .desktop-only .mobile-panel,
      .mobile-only .desktop-panel {
        display: none;
      }

      .desktop-only {
        grid-template-columns: minmax(0, 1fr);
      }

      .mobile-only {
        grid-template-columns: minmax(320px, 414px);
        justify-content: center;
      }

      @media (max-width: 900px) {
        body {
          overflow: auto;
        }

        .preview-shell {
          min-height: 100vh;
          height: auto;
        }

        .preview-bar {
          align-items: flex-start;
          flex-direction: column;
        }

        .stage {
          grid-template-columns: minmax(0, 1fr);
          height: auto;
        }

        .panel {
          min-height: 720px;
        }
      }
    </style>
  </head>
  <body>
    <main class="preview-shell">
      <header class="preview-bar">
        <div class="preview-title">
          <strong>Responsive Preview</strong>
          <span>Use this helper while editing. The real website is still at /.</span>
        </div>
        <div class="preview-controls" aria-label="Preview mode">
          <button type="button" data-mode="compare" aria-pressed="true">Compare</button>
          <button type="button" data-mode="desktop">Desktop</button>
          <button type="button" data-mode="mobile">Mobile</button>
        </div>
      </header>

      <section class="stage" id="stage">
        <article class="panel desktop-panel">
          <div class="panel-header">
            <span>Desktop</span>
            <span>Flexible width</span>
          </div>
          <iframe src="/" title="Desktop website preview"></iframe>
        </article>
        <article class="panel mobile-panel">
          <div class="panel-header">
            <span>Mobile</span>
            <span>414 px</span>
          </div>
          <iframe src="/" title="Mobile website preview"></iframe>
        </article>
      </section>
    </main>

    <script>
      const stage = document.querySelector("#stage");
      const buttons = Array.from(document.querySelectorAll("[data-mode]"));

      function setMode(mode) {
        stage.classList.toggle("desktop-only", mode === "desktop");
        stage.classList.toggle("mobile-only", mode === "mobile");
        buttons.forEach((button) => {
          button.setAttribute("aria-pressed", String(button.dataset.mode === mode));
        });
      }

      buttons.forEach((button) => {
        button.addEventListener("click", () => setMode(button.dataset.mode));
      });
    </script>
  </body>
</html>
